<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCIETRA | Smart Society Management Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #0ea5e9;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Sidebar = ({ activePage, setPage }) => {
            const menu = [
                { id: 'dashboard', name: 'Dashboard', icon: '📊' },
                { id: 'billing', name: 'Maintenance', icon: '🧾' },
                { id: 'accounting', name: 'Accounting', icon: '💰' },
                { id: 'records', name: 'Reports', icon: '📝' },
                { id: 'security', name: 'Security', icon: '🛡️' },
                { id: 'assets', name: 'Assets', icon: '📦' },
                { id: 'intelligence', name: 'AI Insights', icon: '🧠' },
            ];

            return (
                <div className="w-64 h-screen fixed left-0 top-0 bg-[#1e293b] border-r border-[#334155] p-6 flex flex-col">
                    <div className="flex items-center gap-3 mb-10">
                        <div className="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-sky-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">S</div>
                        <h2 className="text-xl font-bold tracking-tight">SOCIETRA</h2>
                    </div>
                    <nav className="flex-1 space-y-2">
                        {menu.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setPage(item.id)}
                                className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${activePage === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}
                            >
                                <span>{item.icon}</span>
                                <span className="font-medium">{item.name}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const Dashboard = () => (
            <div className="animate-in fade-in duration-500">
                <header className="mb-8">
                    <h1 className="text-3xl font-bold">Society Overview</h1>
                    <p className="text-slate-400">Welcome to Societra Management Portal</p>
                </header>
                <div className="grid grid-cols-4 gap-6 mb-8">
                    {[
                        { t: 'Total Collection', v: '₹12.5L', c: 'text-emerald-400' },
                        { t: 'Pending Dues', v: '₹1.2L', c: 'text-rose-400' },
                        { t: 'Active Units', v: '184', c: 'text-sky-400' },
                        { t: 'Available Funds', v: '₹4.8L', c: 'text-indigo-400' },
                    ].map((s, i) => (
                        <div key={i} className="bg-[#1e293b] border border-[#334155] p-6 rounded-2xl hover:border-indigo-500 transition-all">
                            <p className="text-slate-400 text-sm mb-1">{s.t}</p>
                            <h2 className={`text-2xl font-bold ${s.c}`}>{s.v}</h2>
                        </div>
                    ))}
                </div>
                <div className="bg-[#1e293b] border border-[#334155] p-8 rounded-2xl h-64 flex items-center justify-center">
                    <p className="text-slate-500 italic">Revenue Visualization Chart Placeholder</p>
                </div>
            </div>
        );

        const Intelligence = () => (
            <div className="animate-in slide-in-from-bottom-5 duration-500">
                <header className="mb-8">
                    <h1 className="text-3xl font-bold gradient-text">AI Recovery Intelligence</h1>
                    <p className="text-slate-400">Predictive analysis for maintenance collection</p>
                </header>
                <div className="space-y-4">
                    {[
                        { u: 'C-504', m: 'Priya Verma', r: '88%', l: 'CRITICAL', a: 'Legal Notice' },
                        { u: 'A-102', m: 'Vikram Singh', r: '65%', l: 'HIGH', a: 'Committee Meeting' },
                    ].map((p, i) => (
                        <div key={i} className="bg-[#1e293b] border border-[#334155] p-6 rounded-2xl flex items-center justify-between border-r-4 border-r-rose-500">
                            <div>
                                <h4 className="font-bold text-lg">{p.u} - {p.m}</h4>
                                <p className="text-sm text-slate-400">Estimated probability of default: <span className="text-white font-bold">{p.r}</span></p>
                            </div>
                            <div className="text-right">
                                <p className="text-xs text-slate-400 uppercase font-bold mb-1">Recommendation</p>
                                <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold transition-all">
                                    {p.a}
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const App = () => {
            const [page, setPage] = useState('dashboard');

            return (
                <div className="flex">
                    <Sidebar activePage={page} setPage={setPage} />
                    <main className="ml-64 p-10 w-full min-h-screen">
                        {page === 'dashboard' && <Dashboard />}
                        {page === 'intelligence' && <Intelligence />}
                        {page !== 'dashboard' && page !== 'intelligence' && (
                            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center px-6">
                                <div className="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center text-indigo-400 mb-6 text-3xl">🔑</div>
                                <h2 className="text-3xl font-bold mb-4">Demo Credentials</h2>
                                <div className="bg-[#1e293b] border border-[#334155] p-6 rounded-2xl w-full max-w-md text-left space-y-4">
                                    <div className="p-4 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
                                        <p className="text-indigo-400 text-xs font-bold uppercase mb-2">Platform Super Admin</p>
                                        <p className="text-sm">User: <span className="text-white font-mono">admin@societra.com</span></p>
                                        <p className="text-sm">Pass: <span className="text-white font-mono">Admin@123</span></p>
                                        <p className="text-[10px] text-slate-500 mt-2 italic">Bypasses OTP for rapid management access</p>
                                    </div>
                                    <div className="p-4 bg-amber-500/10 rounded-xl border border-amber-500/20">
                                        <p className="text-amber-400 text-xs font-bold uppercase mb-2">Society Admin (Demo Sec)</p>
                                        <p className="text-sm">User: <span className="text-white font-mono">secretary@societra.com</span></p>
                                        <p className="text-sm">Pass: <span className="text-white font-mono">Pass@123</span></p>
                                        <p className="text-[10px] text-slate-500 mt-2 italic">Requires WhatsApp OTP Verification</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
