name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build SOCIETRA ERP APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 36 and Build Tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app (production)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://societra-erp-production.up.railway.app/api

      - name: Write Android local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > frontend/android/local.properties

      - name: Sync Capacitor (copies web assets + generates plugin gradle files)
        working-directory: frontend
        run: ./node_modules/.bin/cap sync android --inline

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOCIETRA-ERP-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SOCIETRA ERP v1.0.${{ github.run_number }}"
          body: |
            ## 📱 SOCIETRA ERP Mobile App

            ### ⬇️ Download & Install
            1. Download **app-debug.apk** below
            2. On your Android phone: **Settings → Security → Install Unknown Apps** → Enable
            3. Open the APK → tap **Install**
            4. Open **SOCIETRA ERP** ✅

            Backend: https://societra-erp-production.up.railway.app
          draft: false
          prerelease: false
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
