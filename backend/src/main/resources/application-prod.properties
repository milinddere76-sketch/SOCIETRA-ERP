# Production profile with Postgres in Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:5432/${POSTGRES_DB:chs_society}
spring.datasource.username=${POSTGRES_USER:chs_admin}
spring.datasource.password=${POSTGRES_PASSWORD:secure_password_here}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
