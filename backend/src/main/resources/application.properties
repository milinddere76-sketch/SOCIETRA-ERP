# Application Info
spring.application.name=society-app

# Database Configuration (PostgreSQL in Docker Compose)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:chs_society}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# JWT Configuration
chs.app.jwt-secret=${JWT_SECRET:DefaultSecretKeyForSocietyAppWithEnoughLengthForHS256_MustBeLong_64Characters}
chs.app.jwt-expiration-ms=${JWT_EXPIRATION:86400000}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_default}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:rzp_test_secret_default}

# WhatsApp Configuration
whatsapp.api.url=${WHATSAPP_API_URL:https://api.interakt.ai/v1/public/message/}
whatsapp.api.key=${WHATSAPP_API_KEY:DEFAULT_WHATSAPP_KEY}

# General Settings
spring.profiles.active=dev
server.port=8080

# CORS Support for Frontend (Custom implementation)
chs.cors.allowed-origins=http://localhost:3000
chs.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Logging
logging.level.com.chs.society=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG

# Email / SMTP Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@societra.in}
spring.mail.password=${MAIL_PASSWORD:your_app_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
societra.mail.from=${MAIL_FROM:noreply@societra.in}
