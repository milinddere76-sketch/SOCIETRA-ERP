name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build SOCIETRA ERP APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app (production)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://societra-erp-production.up.railway.app/api

      - name: Install Capacitor CLI
        working-directory: frontend
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOCIETRA-ERP-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SOCIETRA ERP v1.0.${{ github.run_number }}"
          body: |
            ## 📱 SOCIETRA ERP Mobile App
            
            ### Download
            Download the APK file below and install on any Android phone.
            
            ### Installation Instructions
            1. Download `app-debug.apk` below
            2. On your Android phone: **Settings → Security → Install Unknown Apps** → Enable for your browser
            3. Open the downloaded APK and tap **Install**
            4. Open **SOCIETRA ERP** app
            
            ### What's included
            - Full Society Management ERP
            - Billing & Payments
            - Meeting Management with RSVP
            - Complaints & Visitor Management
            - Notifications via WhatsApp & Email
            
            Backend: https://societra-erp-production.up.railway.app
          draft: false
          prerelease: false
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
